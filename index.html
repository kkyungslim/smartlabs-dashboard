<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smartlabs Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f8f9fa;color:#1a1a2e;font-size:14px}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px}
header{border-bottom:1px solid #e5e7eb;padding-bottom:14px;margin-bottom:20px}
h1{font-size:20px;font-weight:600;color:#111}
.sub{font-size:12px;color:#6b7280;margin-top:3px}
.metric-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
@media(max-width:680px){.metric-grid{grid-template-columns:repeat(2,1fr)}}
.metric{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px}
.metric-label{font-size:11px;color:#6b7280;margin-bottom:5px}
.metric-val{font-size:22px;font-weight:600;color:#111}
.metric-sub{font-size:11px;color:#9ca3af;margin-top:3px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:#374151;margin-bottom:14px}
.chart-wrap{position:relative;width:100%;height:220px}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{background:transparent;border:1px solid #d1d5db;border-radius:8px;padding:5px 14px;font-size:12px;color:#6b7280;cursor:pointer}
.tab.active{background:#f3f4f6;color:#111;border-color:#9ca3af;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;color:#6b7280;font-weight:500;text-align:right;padding:6px 10px;border-bottom:1px solid #e5e7eb;background:#f9fafb;cursor:pointer}
th:first-child{text-align:left}
td{padding:7px 10px;border-bottom:1px solid #f3f4f6;text-align:right;color:#374151}
td:first-child{text-align:left;color:#111}
tr:hover td{background:#f9fafb}
.bar-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.mini-bar{height:5px;border-radius:2px;background:#1D9E75;min-width:2px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.dg{background:#22c55e}.da{background:#f59e0b}.dr{background:#ef4444}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500}
.bg-g{background:#dcfce7;color:#166534}.bg-r{background:#fee2e2;color:#991b1b}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#6b7280;margin-bottom:10px}
.lg-item{display:flex;align-items:center;gap:4px}
.lg-sq{width:10px;height:10px;border-radius:2px}
footer{text-align:center;font-size:11px;color:#9ca3af;margin-top:24px;padding-top:16px;border-top:1px solid #e5e7eb}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Smartlabs 블로그 네트워크</h1>
  <p class="sub">갱신: 2026-07-15 21:05 KST &nbsp;·&nbsp; GA4 실방문자 + 공개피드 집계 &nbsp;·&nbsp; 20개 블로그</p>
</header>

<div class="metric-grid">
  <div class="metric"><div class="metric-label">총 포스팅</div><div class="metric-val">935</div><div class="metric-sub">전체 누적</div></div>
  <div class="metric"><div class="metric-label">오늘 방문자</div><div class="metric-val">1</div><div class="metric-sub">GA4 activeUsers</div></div>
  <div class="metric"><div class="metric-label">7일 방문자</div><div class="metric-val">27</div><div class="metric-sub">최근 7일 합계</div></div>
  <div class="metric"><div class="metric-label">30일 방문자</div><div class="metric-val">176</div><div class="metric-sub">최근 30일 합계</div></div>
  <div class="metric"><div class="metric-label">활성 블로그</div><div class="metric-val" id="m-active">—</div><div class="metric-sub">7일 방문자 있음</div></div>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="setTab('v')">방문자</button>
    <button class="tab" onclick="setTab('p')">포스팅 수</button>
  </div>
  <div class="legend" id="chart-legend">
    <span class="lg-item"><span class="lg-sq" style="background:#378ADD"></span>오늘</span>
    <span class="lg-item"><span class="lg-sq" style="background:#1D9E75"></span>7일</span>
    <span class="lg-item"><span class="lg-sq" style="background:#BA7517"></span>30일</span>
  </div>
  <div class="chart-wrap"><canvas id="mainChart" role="img" aria-label="블로그별 방문자 차트"></canvas></div>
</div>

<div class="card">
  <div class="card-title">블로그별 상세</div>
  <table>
    <thead><tr>
      <th onclick="sortBy('n')">블로그</th>
      <th onclick="sortBy('day1')">오늘</th>
      <th onclick="sortBy('day7')">7일</th>
      <th onclick="sortBy('day30')">30일</th>
      <th onclick="sortBy('total')">포스팅</th>
      <th>최근발행</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer>Smartlabs Dashboard &nbsp;·&nbsp; 매일 23:10 자동 갱신 &nbsp;·&nbsp; by David Lim</footer>
</div>

<script>
const BLOGS = [{"u":"https://smartlabs.kr","total":48,"e":"👶","n":"스마트패밀리","day7":0,"day1":0,"last":"2026-07-15","day30":0,"hn":"smartlabs.kr"},{"u":"https://finance.smartlabs.kr","total":64,"e":"💰","n":"파이낸스랩","day7":0,"day1":0,"last":"2026-07-15","day30":0,"hn":"finance.smartlabs.kr"},{"u":"https://easylife.smartlabs.kr","total":52,"e":"🧾","n":"이지라이프랩","day7":3,"day1":0,"last":"2026-07-15","day30":8,"hn":"easylife.smartlabs.kr"},{"u":"https://housing.smartlabs.kr","total":46,"e":"🏠","n":"하우징랩","day7":0,"day1":0,"last":"2026-07-15","day30":0,"hn":"housing.smartlabs.kr"},{"u":"https://nomad.smartlabs.kr","total":51,"e":"🌐","n":"디지털노마드랩","day7":4,"day1":0,"last":"2026-07-15","day30":16,"hn":"nomad.smartlabs.kr"},{"u":"https://hometech.smartlabs.kr","total":90,"e":"🔌","n":"홈테크랩","day7":2,"day1":0,"last":"2026-07-15","day30":2,"hn":"hometech.smartlabs.kr"},{"u":"https://beauty.smartlabs.kr","total":77,"e":"💄","n":"뷰티랩","day7":1,"day1":0,"last":"2026-07-15","day30":6,"hn":"beauty.smartlabs.kr"},{"u":"https://fandom.smartlabs.kr","total":76,"e":"🎤","n":"스타팬덤랩","day7":0,"day1":0,"last":"2026-07-15","day30":0,"hn":"fandom.smartlabs.kr"},{"u":"https://honeytip.smartlabs.kr","total":63,"e":"🍯","n":"꿀팁창고","day7":1,"day1":0,"last":"2026-07-15","day30":5,"hn":"honeytip.smartlabs.kr"},{"u":"https://futures.smartlabs.kr","total":42,"e":"🔮","n":"퓨처스랩","day7":1,"day1":0,"last":"2026-07-15","day30":10,"hn":"futures.smartlabs.kr"},{"u":"https://altcoin.smartlabs.kr","total":38,"e":"🪙","n":"알트코인랩","day7":5,"day1":1,"last":"2026-07-15","day30":21,"hn":"altcoin.smartlabs.kr"},{"u":"https://news.smartlabs.kr","total":30,"e":"📰","n":"크립토뉴스랩","day7":0,"day1":0,"last":"2026-07-15","day30":6,"hn":"news.smartlabs.kr"},{"u":"https://stock.smartlabs.kr","total":24,"e":"📈","n":"스톡마켓랩","day7":2,"day1":0,"last":"2026-07-15","day30":10,"hn":"stock.smartlabs.kr"},{"u":"https://guide.smartlabs.kr","total":43,"e":"💼","n":"부업수익노트","day7":3,"day1":0,"last":"2026-07-15","day30":9,"hn":"guide.smartlabs.kr"},{"u":"https://movie.smartlabs.kr","total":27,"e":"🎬","n":"무비드라마랩","day7":2,"day1":0,"last":"2026-07-14","day30":13,"hn":"movie.smartlabs.kr"},{"u":"https://tax.smartlabs.kr","total":30,"e":"⚖️","n":"세금법률랩","day7":0,"day1":0,"last":"2026-07-14","day30":11,"hn":"tax.smartlabs.kr"},{"u":"https://health.smartlabs.kr","total":33,"e":"🩺","n":"헬스라이프랩","day7":0,"day1":0,"last":"2026-07-14","day30":30,"hn":"health.smartlabs.kr"},{"u":"https://ai.smartlabs.kr","total":33,"e":"🤖","n":"AI허브","day7":0,"day1":0,"last":"2026-07-14","day30":8,"hn":"ai.smartlabs.kr"},{"u":"https://career.smartlabs.kr","total":34,"e":"🧭","n":"커리어가이드","day7":2,"day1":0,"last":"2026-07-14","day30":12,"hn":"career.smartlabs.kr"},{"u":"https://shopping.smartlabs.kr","total":34,"e":"🛒","n":"쇼핑팁스","day7":1,"day1":0,"last":"2026-07-14","day30":9,"hn":"shopping.smartlabs.kr"}];
const maxD30 = Math.max(...BLOGS.map(b=>b.day30));
const maxT   = Math.max(...BLOGS.map(b=>b.total));
document.getElementById('m-active').textContent = BLOGS.filter(b=>b.day7>0).length+'/20';

let sortKey='day30', sortDir=-1, tab='v', chartInst=null;

function buildChart(){
  if(chartInst) chartInst.destroy();
  const src = [...BLOGS].sort((a,b)=>b.day30-a.day30);
  let datasets, leg;
  if(tab==='v'){
    datasets=[
      {label:'오늘',data:src.map(b=>b.day1),backgroundColor:'#378ADD',borderRadius:2,borderSkipped:false},
      {label:'7일', data:src.map(b=>b.day7), backgroundColor:'#1D9E75',borderRadius:2,borderSkipped:false},
      {label:'30일',data:src.map(b=>b.day30),backgroundColor:'#BA7517',borderRadius:2,borderSkipped:false}
    ];
    leg='<span class="lg-item"><span class="lg-sq" style="background:#378ADD"></span>오늘</span><span class="lg-item"><span class="lg-sq" style="background:#1D9E75"></span>7일</span><span class="lg-item"><span class="lg-sq" style="background:#BA7517"></span>30일</span>';
  } else {
    datasets=[{label:'포스팅',data:src.map(b=>b.total),backgroundColor:src.map(b=>b.total>30?'#1D9E75':b.total>15?'#BA7517':'#E24B4A'),borderRadius:2,borderSkipped:false}];
    leg='<span class="lg-item"><span class="lg-sq" style="background:#1D9E75"></span>30개+</span><span class="lg-item"><span class="lg-sq" style="background:#BA7517"></span>16~30개</span><span class="lg-item"><span class="lg-sq" style="background:#E24B4A"></span>15개 이하</span>';
  }
  document.getElementById('chart-legend').innerHTML=leg;
  chartInst=new Chart(document.getElementById('mainChart'),{
    type:'bar',
    data:{labels:src.map(b=>b.e+' '+b.n),datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45,autoSkip:false},grid:{display:false}},
              y:{ticks:{font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}}}}
  });
}
function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='v')||(i===1&&t==='p')));
  buildChart();
}
function sortBy(k){
  if(sortKey===k) sortDir*=-1; else{sortKey=k;sortDir=-1;}
  render();
}
function render(){
  const d=[...BLOGS].sort((a,b)=>typeof a[sortKey]==='string'?a[sortKey].localeCompare(b[sortKey])*sortDir:(b[sortKey]-a[sortKey])*sortDir);
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=d.map(b=>{
    const diff=(new Date('2026-07-15 21:05'.split(' ')[0])-new Date(b.last))/86400000;
    const dc=diff<=1?'dg':diff<=3?'da':'dr';
    const bar=maxD30>0?Math.round((b.day30/maxD30)*60):0;
    return '<tr onclick="window.open(\''+b.u+'\',\'_blank\')" style="cursor:pointer">'
      +'<td><span class="dot '+dc+'"></span>'+b.e+' '+b.n+'</td>'
      +'<td>'+(b.day1||'—')+'</td>'
      +'<td><div class="bar-wrap"><div class="mini-bar" style="width:'+Math.round((b.day7/(maxD30||1))*60)+'px;background:#1D9E75"></div>'+(b.day7||'—')+'</div></td>'
      +'<td><div class="bar-wrap"><div class="mini-bar" style="width:'+bar+'px;background:#BA7517"></div>'+(b.day30||'—')+'</div></td>'
      +'<td>'+b.total+'</td>'
      +'<td style="color:#9ca3af">'+b.last+'</td></tr>';
  }).join('');
}
buildChart();
render();
</script>
</body>
</html>
